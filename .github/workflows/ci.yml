name: CI - Train Sentiment Model

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Workflow-CI/MLProject/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Jumlah epoch training'
        required: false
        default: '5'

jobs:
  train:
    name: Train & Log Model (MLflow Project)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --------------------------------------------------------
      # 1. Checkout repository
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # 2. Setup Python
      # --------------------------------------------------------
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      # --------------------------------------------------------
      # 3. Install dependencies
      # --------------------------------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 tensorflow==2.16.1 keras-tuner==1.4.7 \
                      scikit-learn==1.5.2 pandas==2.2.3 numpy==1.26.4 \
                      matplotlib==3.9.4 seaborn==0.13.2 PySastrawi==1.2.1

      # --------------------------------------------------------
      # 4. Jalankan MLflow Project (training)
      # --------------------------------------------------------
      - name: Run MLflow Project
        run: |
          cd Workflow-CI/MLProject
          mlflow run . \
            --env-manager=local \
            -P data_path=dataset_sentimen_preprocessing.csv \
            -P epochs=${{ github.event.inputs.epochs || '5' }}

      # --------------------------------------------------------
      # 5. Upload artefak model ke GitHub Actions (Skilled)
      # --------------------------------------------------------
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentiment-model-artifacts
          path: Workflow-CI/MLProject/mlruns/
          retention-days: 30

      # --------------------------------------------------------
      # 6. Get MLflow Run ID untuk Docker build (Advance)
      # --------------------------------------------------------
      - name: Get latest MLflow Run ID
        id: get_run_id
        run: |
          RUN_ID=$(python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient('Workflow-CI/MLProject/mlruns')
          exps = client.search_experiments()
          runs = client.search_runs(
              [e.experiment_id for e in exps],
              order_by=['start_time DESC'],
              max_results=1
          )
          print(runs[0].info.run_id)
          ")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Run ID: $RUN_ID"

      # --------------------------------------------------------
      # 7. Build Docker Image dengan MLflow (Advance)
      # --------------------------------------------------------
      - name: Build Docker image with MLflow
        run: |
          cd Workflow-CI/MLProject
          mlflow models build-docker \
            --model-uri "runs:/${{ steps.get_run_id.outputs.run_id }}/model_output" \
            --name ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-gojek:latest \
            --env-manager=local

      # --------------------------------------------------------
      # 8. Login & Push ke Docker Hub (Advance)
      # --------------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-gojek:latest
